services:

  # ── Backend: FastAPI ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: backend/.env
    environment:
      CHROMA_PERSIST_DIR: /data/chroma_db
    volumes:
      # Bind mount: carpeta real en tu máquina → los datos sobreviven cualquier reinicio
      - ./db:/data/chroma_db
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Frontend: React (build) + Nginx ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
