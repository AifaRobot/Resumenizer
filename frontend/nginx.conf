# Nginx sirve el build estático de React y hace de proxy hacia el backend.
# En producción reemplaza el proxy de Vite que solo funciona en desarrollo.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy para la API: todas las rutas /api y /health van al backend
    # El nombre "backend" coincide con el service name en docker-compose
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Subida de archivos grandes (máx 10 MB del backend)
        client_max_body_size 11m;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    # React Router: cualquier ruta que no sea un archivo estático
    # carga index.html y React maneja el enrutado en el cliente
    location / {
        try_files $uri $uri/ /index.html;
    }
}
